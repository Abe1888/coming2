<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Demo Truck - Vanilla Three.js</title>
    
    <!-- Preload critical 3D assets for faster loading -->
    <link rel="preload" href="/model/Main_truck_updated_compressed.glb" as="fetch" crossorigin="anonymous">
    <link rel="preconnect" href="https://www.gstatic.com">
    <link rel="dns-prefetch" href="https://www.gstatic.com">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
      body {
        margin: 0;
        overflow-y: scroll; /* Keep scroll functionality */
        overflow-x: hidden;
        background-color: #ebebeb;
        font-family: 'Inter', sans-serif;
      }
      
      /* Hide scrollbar completely while keeping scroll functionality */
      /* For Webkit browsers (Chrome, Safari, Edge) */
      ::-webkit-scrollbar {
        width: 0;
        height: 0;
        display: none;
      }
      
      /* For Firefox */
      * {
        scrollbar-width: none;
      }
      
      /* For IE and Edge Legacy */
      body {
        -ms-overflow-style: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    
    <!-- Scrollable spacer for camera animation (500vh = 5x viewport height) -->
    <div style="height: 500vh; pointer-events: none;"></div>
    
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
